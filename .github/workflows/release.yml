name: auto-update

on:
  schedule:
    - cron: "0 3 * * *"      # 9 AM IST
    - cron: "0 */9 * * *"    # every 9 hours
  workflow_dispatch:

permissions:
  contents: write

env:
  TZ: Asia/Kolkata

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Pull Arch Linux Docker image
        run: docker pull archlinux:latest

      - name: Clone repo
        run: |
          git clone https://"honeypie112":"${{ secrets.GITHUBTOKEN }}"@github.com/honeypie112/android-studio-alex build

      - name: Build package in Arch container
        run: |
          docker run --rm \
            -v ${{ github.workspace }}/build:/build \
            archlinux:latest \
            bash -c "
              pacman -Syu --noconfirm base-devel git wget sudo &&
              useradd builduser &&
              echo 'builduser ALL=(ALL) NOPASSWD: ALL' >> /etc/sudoers &&
              chown -R builduser /build &&
              su builduser -c '
                cd /build
                wget https://developer.android.com/studio -O studio.html
                makepkg -sf --noconfirm
              '
            "

      - name: Generate Tag
        run: echo "TAG_NAME=v$(date +'%Y.%m.%d-%H%M')" >> $GITHUB_ENV

      - name: Release
        uses: softprops/action-gh-release@v2.5.0
        with:
          tag_name: ${{ env.TAG_NAME }}
          name: ${{ env.TAG_NAME }}
          body: Workflow Hash `${{ github.sha }}`
          files: build/*.pkg.tar.zst
          overwrite_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUBTOKEN }}

      - name: Update PKGBUILD and push
        run: |
          cd build
          bash update.sh ${{ secrets.BOTTOKEN }}